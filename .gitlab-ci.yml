stages:
  - Setup
  - Lint
  - Test
  - Build
  - Publish

Install Dependencies:
  stage: Setup
  image: node:20
  tags:
    - docker
  script:
    - npm install -g npm
    - npm install
  artifacts:
    name: node_modules
    paths:
      - node_modules
    expire_in: 1 week

Lint:
  stage: Lint
  image: node:20
  tags:
    - docker
  script:
    - npm run lint

Test:
  stage: Test
  image: node:20
  tags:
    - docker
  script:
    - npm test
  artifacts:
    name: coverage
    paths:
      - coverage
    expire_in: 1 week

Build Docker Image:
  stage: Build
  image: docker:stable
  services:
    - docker:stable-dind
  except:
    - main
  tags:
    - docker
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:build .

Build Distributable:
  stage: Build
  image: node:20
  tags:
    - docker
  script:
    - npm run build:bin
    - npm run build:docs
    - cp -f .env.example build/pkg/.env
    - cp -rf build/docs/ build/pkg/docs/
    - mkdir -p build/pkg/workflows/img2img/upscalers/
    - mkdir -p build/pkg/workflows/txt2img/
    - mkdir -p build/pkg/workflows/txt2vid/
    - cp -f workflows/production/director/txt2vid/mochi.json build/pkg/workflows/txt2vid/mochi.json
    - cp -f workflows/production/director/txt2vid/wan.json build/pkg/workflows/txt2vid/wan.json
    - cp -f workflows/production/dreamshaper/txt2img/dreamshaper-xl.json build/pkg/workflows/txt2img/dreamshaper-xl.json
    - cp -f workflows/production/flux/img2img/upscalers/detail.json build/pkg/workflows/img2img/upscalers/detail.json
    - cp -f workflows/production/flux/img2img/upscalers/detail.json build/pkg/workflows/img2img/upscalers/design.json
    - cp -f workflows/production/flux/txt2img/flux_q8.json build/pkg/workflows/txt2img/flux_q8.json
    - cp -f LICENSE.md build/pkg/LICENSE.txt
    - cp -f logo.jpg build/pkg/musebot.jpg
    - cp -f logo.png build/pkg/musebot.png
    - cp -f musebot.ico build/pkg/musebot.ico
    - cp -f Dockerfile_dist build/pkg/Dockerfile
    - cp -f docker-compose.yml build/pkg/docker-compose.yml
    - mv build/pkg/musebot-linux build/pkg/musebot-linux-x86_64
    - mv build/pkg/musebot-macos build/pkg/musebot-macos-x86_64
    - mv build/pkg/musebot-win.exe build/pkg/musebot-win-x86_64.exe
  artifacts:
    name: musebot
    paths:
      - build/pkg/
    expire_in: 1 week

Publish Docker Image:
  stage: Publish
  image: docker:stable
  services:
    - docker:stable-dind
  only:
    - main
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:latest .
    - docker push $CI_REGISTRY/xcjs/musebot:latest
