stages:
  - Setup
  - Lint
  - Test
  - Build
  - Publish

Install Dependencies:
  stage: Setup
  image: node:lts
  tags:
    - docker
  script:
    - npm install
  artifacts:
    name: node_modules
    paths:
      - node_modules
    expire_in: 1 week

Lint:
  stage: Lint
  image: node:lts
  tags:
    - docker
  script:
    - npm run lint

Test:
  stage: Test
  image: node:lts
  tags:
    - docker
  script:
    - npm test
  artifacts:
    name: coverage
    paths:
      - coverage
    expire_in: 1 week

Build Docker Image:
  stage: Build
  image: docker:stable
  services:
    - docker:stable-dind
  except:
    - main
  tags:
    - docker
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:build .

Build Distributable:
  stage: Build
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run build:bin
    - cp -f .env.example build/pkg/.env
    - cp -rf docs/ build/pkg/docs/
    - cp -f LICENSE.md build/pkg/LICENSE.txt
    - cp -f logo.jpg build/pkg/musebot.jpg
    - cp -f logo.png build/pkg/musebot.png
    - cp -f musebot.ico build/pkg/musebot.ico
    - cp -f Dockerfile_dist build/pkg/Dockerfile
    - cp -f docker-compose.yml build/pkg/docker-compose.yml
    - mv build/pkg/musebot-linux build/pkg/musebot-linux-x86_64
    - mv build/pkg/musebot-macos build/pkg/musebot-macos-x86_64
    - mv build/pkg/musebot-win.exe build/pkg/musebot-win-x86_64.exe
  artifacts:
    name: musebot
    paths:
      - build/pkg/
    expire_in: 1 week

Publish Docker Image:
  stage: Publish
  image: docker:stable
  services:
    - docker:stable-dind
  only:
    - main
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:latest .
    - docker push $CI_REGISTRY/xcjs/musebot:latest
