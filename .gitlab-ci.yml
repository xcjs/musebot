stages:
  - Setup
  - Lint
  - Test
  - Build
  - Publish
  - Review

Install Linux Dependencies:
  stage: Setup
  image: node:24
  needs: []
  tags:
    - docker
  script:
    - npm ci
    - npm install --cpu=x64 --os=linux --libc=glibc sharp
    - npm list
  artifacts:
    name: node_modules_linux
    paths:
      - node_modules
    expire_in: 1 week

Install Windows Dependencies:
  stage: Setup
  image: node:24
  needs: []
  tags:
    - docker
  script:
    - npm ci
    - npm install --cpu=x64 --os=win32 sharp
    - npm list
  artifacts:
    name: node_modules_windows
    paths:
      - node_modules
    expire_in: 1 week

Lint:
  stage: Lint
  image: node:24
  needs: ["Install Linux Dependencies"]
  tags:
    - docker
  script:
    - npm run lint

Test:
  stage: Test
  image: node:24
  needs: ["Install Linux Dependencies"]
  tags:
    - docker
  script:
    - npm test
  artifacts:
    name: coverage
    paths:
      - coverage
    expire_in: 1 week

Build Musebot Docker Image:
  stage: Build
  image: docker:dind
  needs: ["Install Linux Dependencies", "Lint", "Test"]
  services:
    - docker:dind
  except:
    - main
  tags:
    - docker
  script:
    - docker build --rm -t $CI_REGISTRY/xcjs/musebot:build-$CI_JOB_ID .

Build Docs Docker Image:
  stage: Build
  image: docker:dind
  needs: ["Install Linux Dependencies", "Lint"]
  services:
    - docker:dind
  except:
    - main
  tags:
    - docker
  script:
    - docker build --rm -f Dockerfile.docs -t $CI_REGISTRY/xcjs/musebot/docs:build-$CI_JOB_ID .

