stages:
  - lint
  - build
  - deploy

Lint:
  stage: lint
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run lint

Build:
  stage: build
  image: docker:stable
  services:
    - docker:stable-dind
  except:
    - main
  tags:
    - docker
  before_script:
    - export tagName=$(echo "${CI_COMMIT_REF_NAME}" | tr "/" "-")
  script:
    - docker build -t "musebot:${tagName}" .
  after_script:
    - tagName=$(echo "${CI_COMMIT_REF_NAME}" | tr "/" "-")
    - docker image rm "musebot:${tagName}"

Build (Nexe):
  stage: build
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run build
  artifacts:
    name: musebot_linux_amd64
    paths:
      - bin/musebot
    expire_in: 1 week

Deploy:
  stage: deploy
  image: docker:stable
  services:
    - docker:stable-dind
  only:
    - main
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:latest .
    - docker push $CI_REGISTRY/xcjs/musebot:latest
