stages:
  - Setup
  - Lint
  - Test
  - Build
  - Publish
  - Review

Install Dependencies:
  stage: Setup
  image: node:24
  needs: []
  tags:
    - docker
  script:
    - npm ci
    - npm install --cpu=x64 --os=linux --libc=glibc sharp
    - npm install --cpu=x64 --os=darwin sharp
    - npm install --cpu=x64 --os=win32 sharp
    - npm list
  artifacts:
    name: node_modules
    paths:
      - node_modules
    expire_in: 1 week

Lint:
  stage: Lint
  image: node:24
  needs: ["Install Dependencies"]
  tags:
    - docker
  script:
    - npm run lint

Test:
  stage: Test
  image: node:24
  needs: ["Install Dependencies"]
  tags:
    - docker
  script:
    - npm test
  artifacts:
    name: coverage
    paths:
      - coverage
    expire_in: 1 week

Build Docker Image:
  stage: Build
  image: docker:stable
  needs: ["Install Dependencies", "Lint", "Test"]
  services:
    - docker:stable-dind
  except:
    - main
  tags:
    - docker
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:build .

Build Distributable:
  stage: Build
  image: node:24
  needs: ["Install Dependencies", "Lint", "Test"]
  tags:
    - docker
  script:
    - npm run build:bin
    - mv build/pkg/musebot-linux build/pkg/musebot-linux-x86_64
    - mv build/pkg/musebot-win.exe build/pkg/musebot-win-x86_64.exe
    - npm run build:docs
    - cp -f .env.example build/pkg/.env
    - cp -rf build/docs/ build/pkg/docs/
    - mkdir -p build/pkg/workflows/img2img/contextual
    - mkdir -p build/pkg/workflows/img2vid/
    - mkdir -p build/pkg/workflows/txt2audio/
    - mkdir -p build/pkg/workflows/txt2img/
    - mkdir -p build/pkg/workflows/txt2music/
    - mkdir -p build/pkg/workflows/txt2vid/
    - cp -f workflows/production/composer/txt2music/ace-step.json build/pkg/workflows/txt2music/ace-step.json
    - cp -f workflows/production/director/txt2img/wan.json build/pkg/workflows/txt2img/wan.json
    - cp -f workflows/production/dreamshaper/txt2img/dreamshaper-xl_turbo_square.json build/pkg/workflows/txt2img/dreamshaper-xl_turbo_square.json
    - cp -f workflows/production/flux/txt2img/flux-q8_square.json build/pkg/workflows/txt2img/flux-q8_square.json
    - cp -f workflows/production/shared/img2img/01-upscale-detail.json build/pkg/workflows/img2img/01-upscale-detail.json
    - cp -f workflows/production/shared/img2img/02-upscale-design.json build/pkg/workflows/img2img/02-upscale-design.json
    - cp -f workflows/production/shared/img2img/03-extract-subject.json build/pkg/workflows/img2img/03-extract-subject.json
    - cp -f workflows/production/shared/img2img/04-wan.json build/pkg/workflows/img2img/04-wan.json
    - cp -f workflows/production/shared/img2img/contextual/kontext.json build/pkg/workflows/img2img/contextual/kontext.json
    - cp -f LICENSE.md build/pkg/LICENSE.txt
    - cp -f logo.jpg build/pkg/musebot.jpg
    - cp -f logo.png build/pkg/musebot.png
    - cp -f musebot.ico build/pkg/musebot.ico
    - cp -f Dockerfile_dist build/pkg/Dockerfile
    - cp -f docker-compose.yml build/pkg/docker-compose.yml
  artifacts:
    name: musebot
    paths:
      - build/pkg/
    expire_in: 1 week

Publish Docker Image:
  stage: Publish
  image: docker:stable
  needs: ["Install Dependencies", "Lint", "Test"]
  services:
    - docker:stable-dind
  only:
    - main
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:latest .
    - docker push $CI_REGISTRY/xcjs/musebot:latest

Review with gemma3:1b-it-qat:
  stage: Review
  image:
    name: ollama/ollama:latest
    entrypoint: [""]
  script:
    - .gitlab-ci/review.sh "gemma3:1b-it-qat"
  needs: []
  when: manual
  tags:
    - docker
  artifacts:
    paths:
      - Code Review.md

