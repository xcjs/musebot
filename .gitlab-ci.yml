stages:
  - lint
  - transpile
  - deploy
  - build

Lint:
  stage: lint
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run lint

Transpile:
  stage: transpile
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run parcel

Deploy:
  stage: deploy
  image: docker:stable
  services:
    - docker:stable-dind
  only:
    - main
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:latest .
    - docker push $CI_REGISTRY/xcjs/musebot:latest

Build (Nexe):
  stage: build
  only:
    - main
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run build:bin
    - cp -f .env.example bin/.env
    - cp -f logo.jpg bin/logo.jpg
    - cp -rf docs/ bin/docs/
  artifacts:
    name: musebot_linux_amd64
    paths:
      - bin/
    expire_in: 1 week
