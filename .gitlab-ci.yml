stages:
  - lint
  - deploy
  - build

Lint:
  stage: lint
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run lint

Deploy:
  stage: deploy
  image: docker:stable
  services:
    - docker:stable-dind
  only:
    - main
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:latest .
    - docker push $CI_REGISTRY/xcjs/musebot:latest

Build:
  stage: build
  image: node:lts
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run build

Build (Nexe):
  stage: build
  image: node:lts
  only:
    - main
  tags:
    - docker
  before_script:
    - npm install
  script:
    - npm run build:bin
  artifacts:
    name: musebot_linux_amd64
    paths:
      - bin/musebot
    expire_in: 1 week
