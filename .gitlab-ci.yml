stages:
  - Setup
  - Lint
  - Test
  - Review
  - Build
  - Publish

Install Dependencies:
  stage: Setup
  image: node:20
  tags:
    - docker
  script:
    - npm ci
    - npm install --cpu=x64 --os=linux --libc=glibc sharp
    - npm install --cpu=x64 --os=darwin sharp
    - npm install --cpu=x64 --os=win32 sharp
    - npm list
  artifacts:
    name: node_modules
    paths:
      - node_modules
    expire_in: 1 week

Lint:
  stage: Lint
  image: node:20
  tags:
    - docker
  script:
    - npm run lint

Review:
  stage: Review
  except:
    - main
  image:
    name: ollama/ollama:latest
    entrypoint: [""]
  script:
    - echo "Running code review..."

    - echo "Finding all TypeScript files in the repository..."

    # Find all TypeScript files in the repository
    - |
      FILES=$(find . -name "*.ts" || true)
      echo "Found TypeScript files: ${FILES}"

      # Exit early if no TypeScript files are found
      if [ -z "${FILES}" ]; then
        echo "No TypeScript files to check."
        exit 0
      fi

    # Clean the Review.md file before starting
    - echo "" > Review.md

    # Review each TypeScript file found in the repository
    - |
      for FILE in $FILES; do
        prompt="Review the following code, provide suggestions for improvement, coding best practices, improve readability, and maintainability. Remove any code smells and anti-patterns. Provide code examples for your suggestion. Respond in markdown format. If the file does not have any code or does not need any changes, say \"No changes needed.\"".\n\n"
        content=$(cat "${FILE}")

        # Run the ollama model
        ollama run gemma3:12b-it-qat "${prompt}" "${content}"

        # Append the suggestions to Review.md
        echo "## Review for ${FILE}" >> Review.md
        echo "" >> Review.md
        echo "${suggestions}" >> Review.md
        echo "" >> Review.md
        echo "---" >> Review.md
        echo "" >> Review.md
      done

      echo "All TypeScript files were reviewed and the suggestions are in Review.md."
  artifacts:
    paths:
      - Review.md

Test:
  stage: Test
  image: node:20
  tags:
    - docker
  script:
    - npm test
  artifacts:
    name: coverage
    paths:
      - coverage
    expire_in: 1 week

Build Docker Image:
  stage: Build
  image: docker:stable
  services:
    - docker:stable-dind
  except:
    - main
  tags:
    - docker
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:build .

Build Distributable:
  stage: Build
  image: node:20
  tags:
    - docker
  script:
    - npm run build:bin
    - mv build/pkg/musebot-linux build/pkg/musebot-linux-x86_64
    - mv build/pkg/musebot-macos build/pkg/musebot-macos-x86_64
    - mv build/pkg/musebot-win.exe build/pkg/musebot-win-x86_64.exe
    - npm run build:docs
    - cp -f .env.example build/pkg/.env
    - cp -rf build/docs/ build/pkg/docs/
    - mkdir -p build/pkg/workflows/img2img/
    - mkdir -p build/pkg/workflows/img2vid/
    - mkdir -p build/pkg/workflows/txt2img/
    - mkdir -p build/pkg/workflows/txt2vid/
    - cp -f workflows/production/director/txt2vid/mochi.json build/pkg/workflows/txt2vid/mochi.json
    - cp -f workflows/production/director/txt2vid/wan.json build/pkg/workflows/txt2vid/wan.json
    - cp -f workflows/production/dreamshaper/txt2img/dreamshaper-xl_turbo_square.json build/pkg/workflows/txt2img/dreamshaper-xl_turbo_square.json
    - cp -f workflows/production/flux/txt2img/flux-q8_square.json build/pkg/workflows/txt2img/flux-q8_square.json
    - cp -f workflows/production/shared/img2img/01-upscale-detail.json build/pkg/workflows/img2img/01-upscale-detail.json
    - cp -f workflows/production/shared/img2img/02-upscale-design.json build/pkg/workflows/img2img/02-upscale-design.json
    - cp -f workflows/production/shared/img2img/03-extract-subject.json build/pkg/workflows/img2img/03-extract-subject.json
    - cp -f workflows/production/shared/img2vid/04-wan.json build/pkg/workflows/img2vid/04-wan.json
    - cp -f LICENSE.md build/pkg/LICENSE.txt
    - cp -f logo.jpg build/pkg/musebot.jpg
    - cp -f logo.png build/pkg/musebot.png
    - cp -f musebot.ico build/pkg/musebot.ico
    - cp -f Dockerfile_dist build/pkg/Dockerfile
    - cp -f docker-compose.yml build/pkg/docker-compose.yml
  artifacts:
    name: musebot
    paths:
      - build/pkg/
    expire_in: 1 week

Publish Docker Image:
  stage: Publish
  image: docker:stable
  services:
    - docker:stable-dind
  only:
    - main
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/xcjs/musebot:latest .
    - docker push $CI_REGISTRY/xcjs/musebot:latest
